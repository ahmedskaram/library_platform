<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة كتاب</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; direction: rtl; }
        h1 { text-align: center; color: #333; }
        .form-container { max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, button { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .errorlist { color: red; list-style: none; padding: 0; }
    </style>
</head>
<body>
    <h1>إضافة كتاب جديد</h1>
    <div class="form-container">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">إضافة</button>
        </form>
        <p><a href="{% url 'books_list' %}">العودة إلى قائمة الكتب</a></p>
    </div>
</body>
</html>
