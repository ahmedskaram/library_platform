<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الكتاب غير موجود</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; direction: rtl; }
        h1 { text-align: center; color: #333; }
        .not-found { max-width: 600px; margin: 0 auto; text-align: center; }
        .not-found p { color: #888; font-style: italic; margin: 20px 0; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #4CAF50; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>الكتاب غير موجود</h1>
    <div class="not-found">
        <p>{{ message }}</p>
    </div>
    <div class="back-link">
        <a href="{% url 'books_list' %}">العودة إلى قائمة الكتب</a>
    </div>
</body>
</html>
